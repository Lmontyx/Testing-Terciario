<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador QA - Tienda Online</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🧪 Simulador QA - Tienda Online</h1>
    <p>Proyecto de práctica para testing funcional y validaciones</p>
  </header>

  <div class="container">

    <section class="products">

      <div class="card">
        <img src="https://picsum.photos/300/200?1">
        <div class="card-content">
          <h3>Notebook Gamer</h3>
          <div class="price">$1200</div>
          <button onclick="addToCart('Notebook Gamer',1200)">Agregar</button>
        </div>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300/200?2">
        <div class="card-content">
          <h3>Mouse RGB</h3>
          <div class="price">$50</div>
          <button onclick="addToCart('Mouse RGB',50)">Agregar</button>
        </div>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300/200?3">
        <div class="card-content">
          <h3>Teclado Mecánico</h3>
          <div class="price">$90</div>
          <button onclick="addToCart('Teclado Mecánico',90)">Agregar</button>
        </div>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300/200?4">
        <div class="card-content">
          <h3>Monitor 27</h3>
          <div class="price">$350</div>
          <button onclick="addToCart('Monitor 27',350)">Agregar</button>
        </div>
      </div>

    </section>

    <aside class="checkout">

      <h2>🛒 Carrito</h2>

      <div class="cart-items" id="cart-items"></div>

      <div class="total">
        Total: $<span id="total">0</span>
      </div>

      <h2>📋 Formulario de Compra</h2>

      <form id="checkout-form">

        <input type="text" id="name" placeholder="Nombre completo">
        <div class="error" id="name-error"></div>

        <input type="email" id="email" placeholder="Correo electrónico">
        <div class="error" id="email-error"></div>

        <input type="text" id="phone" placeholder="Teléfono">
        <div class="error" id="phone-error"></div>

        <input type="text" id="address" placeholder="Dirección">
        <div class="error" id="address-error"></div>

        <input type="text" id="card" placeholder="Número de tarjeta">
        <div class="error" id="card-error"></div>

        <select id="payment">
          <option value="">Método de pago</option>
          <option>Visa</option>
          <option>Mastercard</option>
          <option>Transferencia</option>
        </select>
        <div class="error" id="payment-error"></div>

        <button type="submit">Finalizar compra</button>

      </form>

      <div class="success" id="success-message">
        ✅ Compra realizada correctamente.
      </div>

    </aside>

  </div>

  <script>

    let total = 0;

    function addToCart(product, price) {

      total += price;

      document.getElementById('total').textContent = total;

      const item = document.createElement('div');

      item.innerHTML = `
        <span>${product}</span>
        <span>$${price}</span>
      `;

      document.getElementById('cart-items').appendChild(item);
    }


    document.getElementById('checkout-form').addEventListener('submit', function(e) {

      e.preventDefault();

      clearErrors();

      let valid = true;

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();
      const card = document.getElementById('card').value.trim();
      const payment = document.getElementById('payment').value;


      if(name.length < 3) {
        showError('name-error', 'El nombre debe tener al menos 3 caracteres');
        valid = false;
      }


      if(!email.includes('@') || !email.includes('.')) {
        showError('email-error', 'Correo inválido');
        valid = false;
      }


      if(phone.length < 8 || isNaN(phone)) {
        showError('phone-error', 'Teléfono inválido');
        valid = false;
      }


      if(address.length < 5) {
        showError('address-error', 'Dirección demasiado corta');
        valid = false;
      }


      if(card.length !== 16 || isNaN(card)) {
        showError('card-error', 'La tarjeta debe tener 16 números');
        valid = false;
      }


      if(payment === '') {
        showError('payment-error', 'Seleccione un método de pago');
        valid = false;
      }


      if(total === 0) {
        alert('El carrito está vacío');
        valid = false;
      }


      if(valid) {
        document.getElementById('success-message').style.display = 'block';

        document.getElementById('checkout-form').reset();

        document.getElementById('cart-items').innerHTML = '';

        total = 0;

        document.getElementById('total').textContent = total;
      }

    });


    function showError(id, message) {
      document.getElementById(id).textContent = message;
    }


    function clearErrors() {

      const errors = document.querySelectorAll('.error');

      errors.forEach(error => {
        error.textContent = '';
      });

      document.getElementById('success-message').style.display = 'none';
    }

  </script>

</body>
